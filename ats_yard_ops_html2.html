<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F8F9FB;color:#1A1F35;min-height:100vh;-webkit-font-smoothing:antialiased;}
input,select,textarea{font-family:'DM Sans',system-ui,sans-serif;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#C8CEDC;border-radius:3px;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(.85);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fadeIn 0.18s ease;}

/* RESPONSIVE GRID HELPERS */
.grid-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.grid-2col{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.grid-form-5{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:12px;}
.grid-form-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;}
.grid-form-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

@media(max-width:768px){
  .grid-stats{grid-template-columns:repeat(2,1fr);}
  .grid-2col{grid-template-columns:1fr;}
  .grid-form-5,.grid-form-4,.grid-form-2{grid-template-columns:1fr;}
  .hide-mobile{display:none!important;}
  .main-content{padding:12px 12px 90px!important;}
  .topbar-title{font-size:13px!important;}
}
@media(min-width:769px){
  .bottom-nav{display:none!important;}
  .top-nav{display:flex!important;}
}
</style>
</head>

function Badge({type,label}){
  const s=BS[type]||BS.available;
  return <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,fontWeight:600,padding:"4px 10px",borderRadius:20,background:s.bg,color:s.color,border:`1px solid ${s.border}`,whiteSpace:"nowrap"}}>

}

function MobileRow({hl,children}){
  const bg=hl==="red"?C.redLight:hl==="amber"?C.amberBg:C.g50;
  const bc=hl==="red"?C.redMid:hl==="amber"?C.amberMid:C.g200;
  const bl=hl==="red"?`3px solid ${C.red}`:hl==="amber"?`3px solid ${C.amber}`:`1px solid ${C.g200}`;
  return <div style={{background:bg,border:`1px solid ${bc}`,borderLeft:bl,borderRadius:8,padding:"12px 14px",marginBottom:8}}>{children}</div>;
}
function MRow({label,children}){
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,gap:8}}>
    <span style={{fontSize:11,fontWeight:700,letterSpacing:"0.05em",textTransform:"uppercase",color:C.g400,flexShrink:0}}>{label}</span>
    <span style={{textAlign:"right"}}>{children}</span>
  </div>;
}

// Detect mobile
function useIsMobile(){
  const [mobile,setMobile]=useState(window.innerWidth<=768);
  useEffect(()=>{
    const h=()=>setMobile(window.innerWidth<=768);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);
  return mobile;
}

function TrailerInventory({trailers,setTrailers}){
  const mobile=useIsMobile();
  const [search,setSearch]=useState("");
  const [fType,setFType]=useState("");
  const [fStat,setFStat]=useState("");
  const [nf,setNf]=useState({type:"53' Flatbed",status:"available",load:"",notes:""});
  const L2K={Available:"available",Loaded:"loaded","Red Tag":"red","DOT Needed":"dot","Out of Yard":"out"};
  const st=search.trim();
  const has=st.length>0;
  const filtered=trailers.filter(t=>{
    const nOk=!has||t.num.includes(st);
    const tOk=!fType||t.type===fType;
    const sOk=!fStat||t.status===L2K[fStat];
    return nOk&&tOk&&sOk;
  });
  const exactExists=trailers.some(t=>t.num===st);
  const showAdd=has&&!exactExists&&filtered.length===0;
  const upd=(num,val)=>setTrailers(prev=>prev.map(t=>t.num===num?{...t,status:val}:t));
  const handleAdd=()=>{if(!st)return;setTrailers(prev=>[...prev,{num:st,...nf}]);setSearch("");setNf({type:"53' Flatbed",status:"available",load:"",notes:""});};

  return <Card>
    <CardHeader title="ATS trailer fleet — Jacksonville" subtitle="Search by trailer number to look up or add." right={<CPill c={`${trailers.length} trailers`}/>}/>
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
      <div style={{position:"relative"}}>
        <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:16,color:C.g400,pointerEvents:"none"}}>⌕</span>
        <input style={{...iS,paddingLeft:34}} placeholder="Search trailer # (e.g. 240)" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <select value={fType} onChange={e=>setFType(e.target.value)} style={{...sS,flex:1,minWidth:130,fontSize:13}}>
          <option value="">All types</option>
          {["53' Flatbed","48' Flatbed","45' Flatbed","30' Flatbed","Stepdeck","Specialized","Exp. Flatbed","40' Chassis","53' Chassis","Flatrack","Cakeboxx"].map(o=><option key={o}>{o}</option>)}
        </select>
        <select value={fStat} onChange={e=>setFStat(e.target.value)} style={{...sS,flex:1,minWidth:130,fontSize:13}}>
          <option value="">All statuses</option>
          {["Available","Loaded","Red Tag","DOT Needed","Out of Yard"].map(o=><option key={o}>{o}</option>)}
        </select>
      </div>
    </div>

    {filtered.length>0&&(mobile?(
      filtered.map(t=><MobileRow key={t.num} hl={t.status==="red"?"red":t.status==="dot"?"amber":undefined}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <Num c={t.num}/>
          <Badge type={t.status}/>
        </div>
        <MRow label="Type"><Mut c={t.type}/></MRow>
        <MRow label="Year / Make"><Mut c={`${t.year||"—"} · ${t.make||"—"}`}/></MRow>
        {(t.load||t.notes)&&<MRow label="Notes"><span>{t.load?<LTag c={t.load}/>:<Mut c={t.notes}/>}</span></MRow>}
        <div style={{marginTop:8}}>
          <select value={t.status} onChange={e=>upd(t.num,e.target.value)} style={{...sS,fontSize:13,width:"100%"}}>
            {["available","loaded","red","dot","out"].map(v=><option key={v} value={v}>{BS[v]?.label||v}</option>)}
          </select>
        </div>
      </MobileRow>)
    ):(
      <>
        <div style={{display:"grid",gridTemplateColumns:"90px 80px 90px 1fr 150px 145px",gap:10,padding:"6px 14px",fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:C.g400,marginBottom:6}}>
          <span>Trailer #</span><span>Year</span><span>Make</span><span>Type / Notes</span><span>Status</span><span>Update</span>
        </div>
        {filtered.map(t=>{
          const hl=t.status==="red"?"red":t.status==="dot"?"amber":undefined;
          const bg=hl==="red"?C.redLight:hl==="amber"?C.amberBg:C.g50;
          const bc=hl==="red"?C.redMid:hl==="amber"?C.amberMid:C.g200;
          const bl=hl==="red"?`3px solid ${C.red}`:hl==="amber"?`3px solid ${C.amber}`:`1px solid ${C.g200}`;
          return <div key={t.num} style={{display:"grid",gridTemplateColumns:"90px 80px 90px 1fr 150px 145px",gap:10,padding:"11px 14px",background:bg,border:`1px solid ${bc}`,borderLeft:bl,borderRadius:8,alignItems:"center",fontSize:13,marginBottom:6}}>
            <Num c={t.num}/><Mut c={t.year||"—"}/><Mut c={t.make||"—"}/>
            <span>{t.load?<LTag c={t.load}/>:<span><Mut c={t.type}/>{t.notes?<span style={{marginLeft:6,fontSize:11,color:C.g400}}>· {t.notes}</span>:null}</span>}</span>
            <span><Badge type={t.status}/></span>
            <select value={t.status} onChange={e=>upd(t.num,e.target.value)} style={{...sS,fontSize:12}}>
              {["available","loaded","red","dot","out"].map(v=><option key={v} value={v}>{BS[v]?.label||v}</option>)}
            </select>
          </div>;
        })}
      </>
    ))}

    {!has&&<div style={{textAlign:"center",padding:"36px 16px",color:C.g400,fontSize:13}}>Search a trailer number above to look it up or add it.</div>}
    {has&&filtered.length===0&&!showAdd&&<div style={{textAlign:"center",padding:"24px 16px",color:C.g400,fontSize:13}}>No trailers match.</div>}
    {showAdd&&<div style={{background:C.navyLight,border:`1px solid ${C.g200}`,borderLeft:`3px solid ${C.navy}`,borderRadius:8,padding:"14px",marginTop:4}}>
      <div style={{fontSize:13,fontWeight:600,color:C.navy,marginBottom:12}}>Trailer <span style={{fontFamily:"monospace"}}>{st}</span> not found — add it now</div>
      <div className="grid-form-4" style={{marginBottom:12}}>
        <FG label="Type"><select style={sS} value={nf.type} onChange={e=>setNf(p=>({...p,type:e.target.value}))}>{["53' Flatbed","48' Flatbed","45' Flatbed","30' Flatbed","Stepdeck","Specialized","Exp. Flatbed","40' Chassis","53' Chassis","Flatrack","Cakeboxx"].map(o=><option key={o}>{o}</option>)}</select></FG>
        <FG label="Status"><select style={sS} value={nf.status} onChange={e=>setNf(p=>({...p,status:e.target.value}))}>{["available","loaded","red","dot","out"].map(v=><option key={v} value={v}>{BS[v]?.label||v}</option>)}</select></FG>
        <FG label="Load #"><input style={iS} placeholder="#9071XXX" value={nf.load} onChange={e=>setNf(p=>({...p,load:e.target.value}))}/></FG>
        <FG label="Notes"><input style={iS} placeholder="Optional notes" value={nf.notes} onChange={e=>setNf(p=>({...p,notes:e.target.value}))}/></FG>
      </div>
      <BtnP onClick={handleAdd} style={{width:"100%",textAlign:"center"}}>Add trailer</BtnP>
    </div>}
  </Card>;
}

    <div className="grid-form-2" style={{marginBottom:12}}>
      <FG label="Trailer #"><input style={iS} placeholder="Trailer number" value={f.trailer} onChange={e=>setF(p=>({...p,trailer:e.target.value}))}/></FG>
      <FG label="Destination city"><input style={iS} placeholder="City, State" value={f.dest} onChange={e=>setF(p=>({...p,dest:e.target.value}))}/></FG>
      <FG label="Return destination"><select style={sS} value={f.ret} onChange={e=>setF(p=>({...p,ret:e.target.value}))}>{["Return to yard","Return to port","Transfer load — hold for dispatch"].map(o=><option key={o}>{o}</option>)}</select></FG>
      <FG label="Driver name"><input style={iS} placeholder="Full name" value={f.driver} onChange={e=>setF(p=>({...p,driver:e.target.value}))}/></FG>
    </div>
    <BtnP onClick={assign} style={{width:"100%",textAlign:"center"}}>Assign trailer</BtnP>
  </Card>;
}

function SisterTrailers({sister,setSister}){
  const [f,setF]=useState({num:"",company:"ATS Logistics",type:"Flatbed",notes:""});
  const sb={available:"available",loaded:"loaded",pending:"pending",hold:"hold"};
  const log=()=>{if(!f.num)return;setSister(p=>[...p,{...f,status:"available"}]);setF({num:"",company:"ATS Logistics",type:"Flatbed",notes:""});};
  return <Card>
    <CardHeader title="Sister company trailers" subtitle="Partner company trailers currently on-site"/>
    {sister.map((r,i)=><MobileRow key={i}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <Num c={r.num}/><Badge type={sb[r.status]||r.status}/>
      </div>
      <MRow label="Company"><Mut c={r.company}/></MRow>
      <MRow label="Type"><Mut c={r.type}/></MRow>
      <MRow label="Location"><Mut c={r.notes}/></MRow>
    </MobileRow>)}
    <Divider/><SecTitle>Log incoming trailer</SecTitle>
    <div className="grid-form-2" style={{marginBottom:12}}>
      <FG label="Trailer #"><input style={iS} placeholder="TR-XXXX" value={f.num} onChange={e=>setF(p=>({...p,num:e.target.value}))}/></FG>
      <FG label="Company"><select style={sS} value={f.company} onChange={e=>setF(p=>({...p,company:e.target.value}))}>{["ATS Logistics","ATS International","ATS Brokerage","Other"].map(o=><option key={o}>{o}</option>)}</select></FG>
      <FG label="Trailer type"><select style={sS} value={f.type} onChange={e=>setF(p=>({...p,type:e.target.value}))}>{["Flatbed","Stepdeck","RGN","Stretch Flatbed","30' Flatbed","45' Flatbed"].map(o=><option key={o}>{o}</option>)}</select></FG>
      <FG label="Location / notes"><input style={iS} placeholder="Where parked, any notes" value={f.notes} onChange={e=>setF(p=>({...p,notes:e.target.value}))}/></FG>
    </div>
    <BtnP onClick={log} style={{width:"100%",textAlign:"center"}}>Log trailer</BtnP>
  </Card>;
}

// ── NAV CONFIG ──
const TABS=[
  {id:"dashboard", label:"Dashboard",  icon:Icons.dashboard},
  {id:"trailers",  label:"Trailers",   icon:Icons.trailers},
  {id:"inbound",   label:"Inbound",    icon:Icons.inbound},
  {id:"outbound",  label:"Outbound",   icon:Icons.outbound},
  {id:"securement",label:"Securement", icon:Icons.securement},
  {id:"mechanic",  label:"Mechanic",   icon:Icons.mechanic},
  {id:"local",     label:"Local",      icon:Icons.local},
  {id:"sister",    label:"Sister Co.", icon:Icons.sister},
];

// ── APP ──
function App(){
  const [tab,setTab]=useState("dashboard");
  const [trailers,setTrailers]=useState(TRAILERS);
  const [inbound,setInbound]=useState(INBOUND);
  const [outbound,setOutbound]=useState(OUTBOUND);
  const [mech,setMech]=useState(MECHANIC);
  const [local,setLocal]=useState(LOCAL);
  const [sister,setSister]=useState(SISTER);
  const [sec,setSec]=useState(SECUREMENT);
  const [date,setDate]=useState("");
  const mobile=useIsMobile();

  useEffect(()=>{
    const d=new Date();
    setDate(d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"}));
  },[]);

  const pageMap={
    dashboard:<Dashboard trailers={trailers}/>,
    trailers:<TrailerInventory trailers={trailers} setTrailers={setTrailers}/>,
    inbound:<InboundLoads inbound={inbound} setInbound={setInbound}/>,
    outbound:<OutboundPR outbound={outbound} setOutbound={setOutbound}/>,
    securement:<LoadSecurement sec={sec} setSec={setSec}/>,
    mechanic:<MechanicBoard mech={mech} setMech={setMech}/>,
    local:<LocalDrivers local={local} setLocal={setLocal}/>,
    sister:<SisterTrailers sister={sister} setSister={setSister}/>,
  };

  return <div style={{fontFamily:"'DM Sans',system-ui,sans-serif",background:C.g50,minHeight:"100vh",color:C.g900}}>

    {/* TOPBAR */}
    <div style={{background:C.navy,height:56,display:"flex",alignItems:"center",padding:"0 16px",gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>
      <span style={{background:C.red,color:"#fff",fontWeight:600,fontSize:13,letterSpacing:"0.08em",padding:"5px 10px",borderRadius:6,flexShrink:0}}>ATS</span>
      <div style={{width:1,height:20,background:"rgba(255,255,255,0.15)",flexShrink:0}}/>
      <span className="topbar-title" style={{color:"rgba(255,255,255,0.9)",fontSize:15,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Yard Operations Center</span>
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        {!mobile&&<span style={{color:"rgba(255,255,255,0.45)",fontSize:12,fontFamily:"monospace"}}>{date}</span>}
        <span style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",color:"rgba(255,255,255,0.8)",fontSize:11,fontWeight:500,padding:"4px 10px",borderRadius:6,whiteSpace:"nowrap"}}>JAX Yard</span>
      </div>
    </div>

    {/* DESKTOP TOP NAV */}
    <div className="top-nav" style={{display:"none",background:C.white,borderBottom:`1.5px solid ${C.g200}`,padding:"0 16px",overflowX:"auto",position:"sticky",top:56,zIndex:99,boxShadow:"0 1px 3px rgba(27,42,74,0.07)"}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"13px 16px",fontSize:13,fontWeight:500,fontFamily:"inherit",whiteSpace:"nowrap",color:tab===t.id?C.red:C.g500,borderBottom:tab===t.id?`2px solid ${C.red}`:"2px solid transparent",transition:"color 0.15s",letterSpacing:"0.01em"}}>{t.label}</button>)}
    </div>

    {/* MAIN CONTENT */}
    <div className="main-content" style={{padding:16,maxWidth:1400,margin:"0 auto"}}>
      <div className="fade" key={tab}>{pageMap[tab]}</div>
    </div>

    {/* MOBILE BOTTOM NAV */}
    <div className="bottom-nav" style={{position:"fixed",bottom:0,left:0,right:0,background:C.white,borderTop:`1px solid ${C.g200}`,display:"flex",zIndex:100,boxShadow:"0 -2px 8px rgba(27,42,74,0.08)"}}>
      {TABS.map(t=>{
        const active=tab===t.id;
        return <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"8px 2px 10px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:active?C.red:C.g400,fontFamily:"inherit",transition:"color 0.15s",minWidth:0}}>
          <Icon d={t.icon} size={20}/>
          <span style={{fontSize:9,fontWeight:active?600:400,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%",letterSpacing:"0.01em"}}>{t.label}</span>
        </button>;
      })}
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
